# Copy to cue.toml and edit. cue.toml is gitignored.

# The intro generator can't wrap text automatically, so we use
# multi-line strings. Up to 4 lines are supported: 1-2 lines render
# at the default 96pt; 3 lines shrink to 78pt and 4 lines to 66pt,
# with the speaker/date rows shifting down to make room.
#
# The script only reacts to line count, not per-line length - if a
# single line is still too wide to fit horizontally, split it across
# more lines rather than relying on the adaptive font-size.
title = """
Zia: A Programming Language that
Defines Itself
"""
speaker = "Charles Johnson"
date = "2026-01-08"

[sources]
# Speaker video is always required.
speaker = "recordings/speaker.mp4"

# Optional. When omitted and cues are empty, the body is just the
# rescaled speaker video. When omitted but cues are present, every
# non-speaker-only cue must supply its own `image` (see below).
screen = "recordings/screen.mp4"

# Optional. Overrides the default body-audio source. When unset:
#   - speaker has audio -> speaker audio track
#   - otherwise         -> screen audio track (set this if neither has audio)
# audio = "recordings/lav.wav"

[sync]
# Correct drift between the two recordings. Watch the unsynced output
# and see which side leads:
#   POSITIVE - screen is AHEAD of speaker (events appear on screen
#              before the speaker describes them; screen started later)
#   NEGATIVE - screen is BEHIND speaker (events on screen lag the
#              narration; screen started first)
# Magnitude = drift in seconds. Omit or 0 if aligned.
# Must be 0 (or omitted) when sources.screen is not set.
screen_offset = 0.0

[layout]
resolution = [1920, 1080]
fps = 30
pip_size = [480, 270]
pip_margin = 40
# Duration (seconds) for PiP slide-in/out and for the base-layer crossfade
# at transitions between screen-primary/screen-only and speaker-primary/speaker-only.
transition_duration = 0.5
# Duration (seconds) of the crossfade between intro, body, and outro segments.
# Set to 0 for a hard cut (fast path: stream copy, no re-encode).
xfade_duration = 0.5

# Each cue declares only `until` — the end of its window. The start is
# implicit: 0 for the first cue, the previous cue's `until` for every
# subsequent cue. Cues must be listed in timeline order, and each `until`
# must be strictly greater than the cue's (implicit) start.
#
# `until` accepts "HH:MM:SS", "MM:SS", bare seconds, or the magic value
# "end" (only valid on the last cue), which resolves to the speaker
# video's duration.
#
# Modes:
#   screen-primary  - screen full frame; speaker as PiP
#   screen-only     - screen full frame; no speaker video
#   speaker-primary - speaker full frame; screen as PiP
#   speaker-only    - speaker full frame only; no screen
#
# `screen-primary` and `speaker-primary` cues take an optional `corner`
# field. The PiP slides in horizontally from the nearest edge and rests
# there. Valid values:
#   bottom-right (default)
#   top-right
#   top-left
#   bottom-left
#
# Any cue that uses the screen role (every mode except `speaker-only`)
# may supply an optional `image` field — a still image that replaces
# the screen source for that cue's window. The image fills the canvas
# in screen-primary/screen-only modes and fills the PiP in
# speaker-primary mode. When `sources.screen` is set, `image` overrides
# the screen video just for that window. When `sources.screen` is unset,
# every non-speaker-only cue must have an `image`. `image` on a
# speaker-only cue is an error.
[[cues]]
mode  = "speaker-only"
until = "00:05:30"

[[cues]]
mode  = "screen-only"
until = "00:06:45"
image = "slides/intro.png"  # optional; replaces screen for this window

[[cues]]
mode  = "screen-primary"
until = "00:38:00"

[[cues]]
mode   = "speaker-primary"
until  = "00:45:00"
corner = "top-right"  # optional corner specification

[[cues]]
mode  = "speaker-only"
until = "end"
