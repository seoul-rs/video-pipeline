<?xml version="1.0" encoding="UTF-8"?>
<!--
  Intro card template.
  Placeholders are substituted by scripts/render-intro.nu.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="12" fill="#ce422b"/>
  <rect x="0" y="1068" width="1920" height="12" fill="#ce422b"/>

  <text x="960" y="200" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="500"
        fill="#ce422b" letter-spacing="8">
    Seoul Rust Meetup
  </text>

  <text x="960" y="500" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700"
        fill="#f5f5f5">
    {{TITLE}}
  </text>

  <text x="960" y="640" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="400"
        fill="#cccccc">
    {{SPEAKER}}
  </text>

  <text x="960" y="900" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="300"
        fill="#888888" letter-spacing="4">
    {{DATE}}
  </text>
</svg>
